<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>employee management system</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <img src="images/logo.png" alt="company logo"  width="150px" height="150px">
                <h2>Allied Software Engineers </h2>
</div>
            <ul class="navlinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="employees.html">Employees</li>
                    <li><a href="register.html">Register</a></li>
            </ul>
        </nav>
    </header>
    <section class="register-section">

        <h1>Employee Registration</h1>

        <form id="employeeForm">

            <div class="form-group">
                <label>Employee ID</label>
                <input type="text" id="employeeId">
            </div>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email">
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" id="phone">
            </div>

            <div class="form-group">
                <label>Department</label>

                <select id="department">

                    <option value="">Select Department</option>

                    <option>HR</option>
                    <option>Development</option>
                    <option>QA</option>
                    <option>Marketing</option>
                    <option>Finance</option>

                </select>

            </div>

            <div class="form-group">
                <label>Designation</label>
                <input type="text" id="designation">
            </div>

            <div class="form-group">
                <label>Joining Date</label>
                <input type="date" id="joiningDate">
            </div>

            <div class="form-group">
                <label>Salary</label>
                <input type="number" id="salary">
            </div>

            <div class="form-group">

                <label>Gender</label>

                <div class="gender">

                    <label>
                        <input type="radio" name="gender" value="Male">
                        Male
                    </label>

                    <label>
                        <input type="radio" name="gender" value="Female">
                        Female
                    </label>

                </div>

            </div>

            <button type="submit" class="btn">
                Register New  Employee
            </button>

        </form>

    </section>

    <footer>

        <p>© 2026 Allied Software Engineers. All Rights Reserved.</p>

    </footer>

    <script src="js/register.js"></script>

</body>
</html>
